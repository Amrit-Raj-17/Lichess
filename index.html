<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Dashboard</title>

    <script src="data/data.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d0f14;
            --bg2: #13161e;
            --bg3: #1a1e29;
            --exp: #0c0e16;
            --border: #252a38;
            --text: #e8ecf4;
            --text2: #7a8099;
            --text3: #4a5068;
            --accent: #a8ff78;
            --accent2: #78ffd6;
            --win: #4ade80;
            --loss: #f87171;
            --draw: #94a3b8;
            --card: #161b27;
            --card-hover: #1e2436;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
            --radius: 10px;
            --chart-grid: rgba(255, 255, 255, 0.04);
            --tooltip-bg: #1a1e2e;
        }

        [data-theme="light"] {
            --bg: #f0f2f7;
            --bg2: #e4e7ef;
            --bg3: #d8dce8;
            --exp: #bec4dd;
            --border: #c8cdd e;
            --text: #0f1117;
            --text2: #4a5068;
            --text3: #8a90a8;
            --accent: #16803c;
            --accent2: #0891b2;
            --win: #16803c;
            --loss: #dc2626;
            --draw: #64748b;
            --card: #ffffff;
            --card-hover: #f5f7ff;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.12);
            --chart-grid: rgba(0, 0, 0, 0.06);
            --tooltip-bg: #ffffff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .last-updated {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            color: var(--text2);
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .variant-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .variant-btn {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .variant-btn:hover {
            background: var(--card-hover);
            color: var(--text);
            border-color: var(--text3);
        }

        .variant-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .stat-card.wins::before {
            background: var(--win);
        }

        .stat-card.loss::before {
            background: var(--loss);
        }

        .stat-card.draw::before {
            background: var(--draw);
        }

        .stat-card.rate::before {
            background: var(--accent2);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 2px;
            width: fit-content;
        }

        .stat-badge.pos {
            background: rgba(74, 222, 128, 0.15);
            color: var(--win);
        }

        .stat-badge.neg {
            background: rgba(248, 113, 113, 0.15);
            color: var(--loss);
        }

        .stat-badge.neu {
            background: rgba(148, 163, 184, 0.15);
            color: var(--draw);
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            margin-bottom: 12px;
        }

        .chart-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .chart-wrap {
            position: relative;
            height: 260px;
        }

        .chart-tooltip {
            position: fixed;
            background: var(--tooltip-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            pointer-events: none;
            z-index: 9999;
            font-size: 12px;
            box-shadow: var(--shadow);
            min-width: 180px;
            display: none;
        }

        .chart-tooltip.visible {
            display: block;
        }

        .ct-rating {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .ct-opp {
            color: var(--text2);
        }

        .ct-opp a {
            color: var(--accent);
        }

        .ct-result-win {
            color: var(--win);
        }

        .ct-result-loss {
            color: var(--loss);
        }

        .ct-result-draw {
            color: var(--draw);
        }

        .form-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 20px;
        }

        .form-strip {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .form-sq {
            width: 28px;
            height: 28px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.5);
        }

        .form-sq:hover {
            transform: scale(1.25);
            opacity: 0.85;
        }

        .form-sq.win {
            background: var(--win);
        }

        .form-sq.loss {
            background: var(--loss);
        }

        .form-sq.draw {
            background: var(--draw);
        }

        .table-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead th {
            background: var(--bg3);
            color: var(--text2);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--card-hover);
        }

        tbody tr.expanded {
            background: var(--exp);
        }

        tbody td {
            padding: 9px 14px;
            color: var(--text2);
            vertical-align: top;
            white-space: nowrap;
        }

        tbody td.result-win {
            color: var(--win);
            font-weight: 500;
        }

        tbody td.result-loss {
            color: var(--loss);
            font-weight: 500;
        }

        tbody td.result-draw {
            color: var(--draw);
            font-weight: 500;
        }

        .my-rating {
            color: var(--text);
            font-weight: 500;
        }

        .color-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .color-dot.white {
            background: #e8e8e8;
            border: 1px solid #aaa;
        }

        .color-dot.black {
            background: #333;
            border: 1px solid #777;
        }

        .moves-row td {
            padding: 0 !important;
        }

        .moves-expander {
            padding: 14px 20px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
        }

        .moves-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .moves-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            flex: 1;
            max-height: 200px;
            overflow-y: auto;
        }

        .move-token {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11.5px;
            color: var(--text2);
            transition: background 0.12s, color 0.12s;
            white-space: nowrap;
        }

        .move-token:hover,
        .move-token.active {
            background: var(--border);
            color: var(--text);
        }

        .move-token.active {
            background: var(--accent);
            color: #000;
        }

        .move-token .move-num {
            color: var(--text3);
            font-size: 10px;
            margin-right: 1px;
        }

        .board-panel {
            width: 214px;
            flex-shrink: 0;
        }

        .board-info {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text3);
            text-align: center;
        }

        .uni-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 200px;
            height: 200px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .uni-board .sq {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            line-height: 1;
            cursor: default;
            user-select: none;
        }

        .uni-board .sq.light {
            background: #f0d9b5;
        }

        .uni-board .sq.dark {
            background: #b58863;
        }

        .uni-board .sq.hl-light {
            background: #cdd26a;
        }

        .uni-board .sq.hl-dark {
            background: #aaa23a;
        }

        .uni-board .sq .wp {
            color: #fff;
            text-shadow: 0 0 1px #333, 0 1px 2px rgba(0, 0, 0, 0.6);
        }

        .uni-board .sq .bp {
            color: #1a1a1a;
            text-shadow: 0 0 1px #fff4, 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .board-coords {
            display: grid;
            grid-template-columns: 14px 200px;
            grid-template-rows: 200px 14px;
            gap: 0;
            margin-bottom: 6px;
        }

        .board-ranks {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 9px;
            color: var(--text3);
            padding-right: 2px;
        }

        .board-files {
            grid-column: 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 9px;
            color: var(--text3);
            padding-top: 2px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        @media (max-width: 700px) {
            .stats-bar {
                grid-template-columns: repeat(3, 1fr);
            }

            .board-panel {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <header class="header">
            <div class="header-left">
                <div>
                    <div class="logo">♟ lichess<span>.</span>dash</div>
                    <div class="last-updated" id="lastUpdated">—</div>
                </div>
            </div>
            <div class="header-right">
                <div class="variant-selector" id="variantSelector"></div>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀</button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <div class="chart-section">
            <div class="section-title">Rating Over Time</div>
            <div class="chart-wrap">
                <canvas id="ratingChart"></canvas>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Recent Form — last 30 games</div>
            <div class="form-strip" id="formStrip"></div>
        </div>

        <div class="table-section">
            <div class="section-title" style="padding:18px 20px 0;">Game Log</div>
            <div class="table-scroll">
                <table id="gamesTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Game</th>
                            <th>Rated</th>
                            <th>Color</th>
                            <th>My Rating</th>
                            <th>Opponent</th>
                            <th>Opp. Rating</th>
                            <th>Result</th>
                            <th>Clock</th>
                            <th>Moves</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="gamesBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="chart-tooltip" id="chartTooltip"></div>

    <script>
        (function () {

            const VARIANTS = [
                'antichess', 'blitz', 'bullet',
                'ultraBullet', 'classical', 'rapid',
                'correspondence', 'chess960', 'atomic',
                'racingKings', 'crazyhouse', 'kingOfTheHill',
                'threeCheck', 'horde'
            ];
            const VARIANT_LABELS = {
                antichess: 'Antichess', blitz: 'Blitz', bullet: 'Bullet',
                ultraBullet: 'Ultra Bullet', classical: 'Classical', rapid: 'Rapid',
                correspondence: 'Correspondence', chess960: 'Chess 960', atomic: 'Atomic',
                racingKings: 'Racing Kings', crazyhouse: 'Crazyhouse', kingOfTheHill: 'King Of The Hill',
                threeCheck: 'Three Check', horde: 'Horde',
            };

            const dataByType = {};
            let currentVariant = 'antichess';
            let ratingChart = null;
            let expandedRow = null;

            function prepareData() {
                VARIANTS.forEach(v => dataByType[v] = []);
                const sorted = [...data.games].sort((a, b) => b.timestamp - a.timestamp);
                sorted.forEach(g => {
                    if (dataByType[g.type]) dataByType[g.type].push(g);
                });
            }

            function renderLastUpdated() {
                const d = new Date(data.lastUpdated);
                document.getElementById('lastUpdated').textContent =
                    'Updated ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            }

            function renderVariantSelector() {
                const container = document.getElementById('variantSelector');
                VARIANTS.forEach(v => {
                    const btn = document.createElement('button');
                    btn.className = 'variant-btn' + (v === currentVariant ? ' active' : '');
                    btn.textContent = VARIANT_LABELS[v];
                    btn.dataset.variant = v;
                    btn.addEventListener('click', () => {
                        currentVariant = v;
                        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderAll();
                    });
                    container.appendChild(btn);
                });
            }

            function renderStats() {
                const games = dataByType[currentVariant];
                if (!games.length) return;

                const liveProfile = profile.profile.perfs;

                const wins = games.filter(g => g.result === 'win').length;
                const losses = games.filter(g => g.result === 'loss').length;
                const draws = games.filter(g => g.result === 'draw').length;
                const played = games.length;
                const winRate = ((wins / played) * 100).toFixed(1);
                const latestRating = liveProfile[currentVariant].rating;
                const ratingDelta = liveProfile[currentVariant].prog;
                const deltaSign = ratingDelta >= 0 ? '+' : '';
                const deltaClass = ratingDelta > 0 ? 'pos' : ratingDelta < 0 ? 'neg' : 'neu';

                document.getElementById('statsBar').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Rating</div>
                        <div class="stat-value">${latestRating}</div>
                        <div class="stat-badge ${deltaClass}">${deltaSign}${ratingDelta} in last 12 games</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Played</div>
                        <div class="stat-value">${played}</div>
                    </div>
                    <div class="stat-card wins">
                        <div class="stat-label">Wins</div>
                        <div class="stat-value" style="color:var(--win)">${wins}</div>
                    </div>
                    <div class="stat-card rate">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value">${winRate}<span style="font-size:14px;color:var(--text3)">%</span></div>
                    </div>
                    <div class="stat-card loss">
                        <div class="stat-label">Losses</div>
                        <div class="stat-value" style="color:var(--loss)">${losses}</div>
                    </div>
                    <div class="stat-card draw">
                        <div class="stat-label">Draws</div>
                        <div class="stat-value" style="color:var(--draw)">${draws}</div>
                    </div>
                `;
            }

            function renderChart() {
                const games = [...dataByType[currentVariant]].reverse();
                if (!games.length) return;

                const labels = games.map(g => new Date(g.timestamp).toISOString().split('T')[0]);
                const ratings = games.map(g => g.rating);
                const colors = games.map(g =>
                    g.result === 'win' ? '#4ade80' :
                        g.result === 'loss' ? '#f87171' : '#94a3b8'
                );

                const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
                const labelColor = isDark ? '#4a5068' : '#8a90a8';

                if (ratingChart) ratingChart.destroy();

                const ctx = document.getElementById('ratingChart').getContext('2d');

                const gradient = ctx.createLinearGradient(0, 0, 0, 260);
                gradient.addColorStop(0, isDark ? 'rgba(168,255,120,0.18)' : 'rgba(22,128,60,0.15)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');

                ratingChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            data: ratings,
                            borderColor: isDark ? '#a8ff78' : '#16803c',
                            borderWidth: 2,
                            pointBackgroundColor: colors,
                            pointRadius: 4,
                            pointHoverRadius: 7,
                            tension: 0,
                            fill: true,
                            backgroundColor: gradient
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        },
                        scales: {
                            x: {
                                grid: { color: gridColor },
                                ticks: { color: labelColor, maxTicksLimit: 12, font: { family: 'DM Mono', size: 10 } }
                            },
                            y: {
                                grid: { color: gridColor },
                                ticks: { color: labelColor, font: { family: 'DM Mono', size: 10 } }
                            }
                        },
                        onHover: null
                    }
                });

                const tooltipEl = document.getElementById('chartTooltip');
                const canvas = document.getElementById('ratingChart');

                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const points = ratingChart.getElementsAtEventForMode(e, 'nearest', { intersect: false }, false);
                    if (!points.length) { tooltipEl.classList.remove('visible'); return; }

                    const idx = points[0].index;
                    const game = games[idx];
                    if (!game) { tooltipEl.classList.remove('visible'); return; }

                    const resultClass = game.result === 'win' ? 'ct-result-win' : game.result === 'loss' ? 'ct-result-loss' : 'ct-result-draw';
                    const dateStr = new Date(game.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

                    tooltipEl.innerHTML = `
                        <div class="ct-rating">${game.rating}</div>
                        <div class="ct-opp">vs <a href="https://lichess.org/@/${game.oppN}" target="_blank">${game.oppN}</a> (${game.oppR})</div>
                        <div class="${resultClass}" style="margin-top:4px;font-size:11px;">${game.result.toUpperCase()} · <a href="https://lichess.org/${game.id}" target="_blank">${game.id}</a></div>
                        <div style="color:var(--text3);font-size:10px;margin-top:2px;">${dateStr} · ${game.clock}</div>
                    `;
                    tooltipEl.classList.add('visible');

                    let tx = e.clientX + 14;
                    let ty = e.clientY - 14;
                    if (tx + 200 > window.innerWidth) tx = e.clientX - 210;
                    tooltipEl.style.left = tx + 'px';
                    tooltipEl.style.top = ty + 'px';
                });

                canvas.addEventListener('mouseleave', () => {
                    tooltipEl.classList.remove('visible');
                });
            }

            function renderFormStrip() {
                const games = dataByType[currentVariant].slice(0, 30);
                const strip = document.getElementById('formStrip');
                strip.innerHTML = '';
                games.forEach((g, i) => {
                    const sq = document.createElement('div');
                    sq.className = 'form-sq ' + g.result;
                    sq.title = `${g.oppN} (${g.oppR}) — ${g.result}`;
                    sq.textContent = g.result === 'win' ? 'W' : g.result === 'loss' ? 'L' : 'D';
                    sq.addEventListener('click', () => {
                        const row = document.querySelector(`tr[data-id="${g.id}"]`);
                        if (row) {
                            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            row.click();
                        }
                    });
                    strip.appendChild(sq);
                });
            }

            function renderTable() {
                const games = dataByType[currentVariant];
                const tbody = document.getElementById('gamesBody');
                tbody.innerHTML = '';

                games.forEach((game, idx) => {
                    const resultClass = `result-${game.result}`;
                    const dateStr = new Date(game.timestamp).toLocaleDateString(undefined, {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });
                    const moveCount = game.moves.trim().split(/\s+/).length;

                    const tr = document.createElement('tr');
                    tr.dataset.id = game.id;
                    tr.innerHTML = `
                        <td style="color:var(--text3)">${idx + 1}</td>
                        <td><a href="https://lichess.org/${game.id}" target="_blank" onclick="event.stopPropagation()">${game.id}</a></td>
                        <td>${game.rated ? '✓' : '—'}</td>
                        <td><span class="color-dot ${game.color}"></span>${game.color}</td>
                        <td class="my-rating">${game.rating}</td>
                        <td><a href="https://lichess.org/@/${game.oppN}" target="_blank" onclick="event.stopPropagation()">${game.oppN}</a></td>
                        <td>${game.oppR}</td>
                        <td class="${resultClass}">${game.result}</td>
                        <td>${game.clock}</td>
                        <td style="color:var(--text3)">${moveCount} ply</td>
                        <td style="color:var(--text3)">${dateStr}</td>
                    `;

                    tr.addEventListener('click', () => toggleMoves(game, tr));
                    tbody.appendChild(tr);
                });
            }

            function toggleMoves(game, tr) {
                if (expandedRow) {
                    expandedRow.remove();
                    expandedRow = null;
                    document.querySelectorAll('tbody tr.expanded').forEach(r => r.classList.remove('expanded'));
                }

                if (tr.dataset.expanded === '1') {
                    tr.dataset.expanded = '0';
                    return;
                }

                document.querySelectorAll('tbody tr').forEach(r => r.dataset.expanded = '0');
                tr.dataset.expanded = '1';
                tr.classList.add('expanded');

                const moveTokens = game.moves.trim().split(/\s+/);
                const chess = new Chess();
                const fens = [chess.fen()];
                moveTokens.forEach(mv => {
                    try { chess.move(mv, { sloppy: true }); fens.push(chess.fen()); } catch (e) { }
                });

                const expRow = document.createElement('tr');
                expRow.className = 'moves-row';
                const td = document.createElement('td');
                td.colSpan = 11;

                const expDiv = document.createElement('div');
                expDiv.className = 'moves-expander';

                expDiv.innerHTML = `
                    <div class="moves-header">
                        <span style="color:var(--text2);font-size:11px;">${game.oppN} (${game.oppR}) · ${game.clock} · ${game.color} · ${game.result}</span>
                        <a href="https://lichess.org/${game.id}" target="_blank" style="font-size:11px;">Open on Lichess ↗</a>
                    </div>
                    <div class="moves-layout">
                        <div class="moves-list" id="movesList-${game.id}"></div>
                            <div class="board-panel">
                                <div class="board-coords">
                                    <div class="board-ranks" id="board-ranks-${game.id}">8<br>7<br>6<br>5<br>4<br>3<br>2<br>1</div>
                                    <div id="mini-board-${game.id}" class="uni-board"></div>
                                <div></div>
                                <div class="board-files">a<span></span>b<span></span>c<span></span>d<span></span>e<span></span>f<span></span>g<span></span>h</div>
                            </div>
                            <div class="board-info" id="board-info-${game.id}">Starting position</div>
                        </div>
                    </div>
                `;

                td.appendChild(expDiv);
                expRow.appendChild(td);
                tr.after(expRow);
                expandedRow = expRow;

                const boardId = `mini-board-${game.id}`;
                renderUniBoard(boardId, fens[0], null);

                const movesListEl = document.getElementById(`movesList-${game.id}`);
                const infoEl = document.getElementById(`board-info-${game.id}`);
                let activeMoveEl = null;

                const startToken = document.createElement('span');
                startToken.className = 'move-token active';
                startToken.textContent = 'start';
                startToken.addEventListener('click', () => {
                    renderUniBoard(boardId, fens[0], null);
                    infoEl.textContent = 'Starting position';
                    if (activeMoveEl) activeMoveEl.classList.remove('active');
                    startToken.classList.add('active');
                    activeMoveEl = startToken;
                });
                movesListEl.appendChild(startToken);
                activeMoveEl = startToken;

                let fenIdx = 1;
                moveTokens.forEach((mv, i) => {
                    const span = document.createElement('span');
                    span.className = 'move-token';
                    const moveNumber = Math.floor(i / 2) + 1;
                    const side = i % 2 === 0 ? 'W' : 'B';
                    span.innerHTML = `<span class="move-num">${moveNumber}${i % 2 === 0 ? '.' : '....'}</span>${mv}`;

                    const capturedFen = fens[fenIdx] || fens[fens.length - 1];
                    const capturedMoveNum = moveNumber;
                    span.addEventListener('mouseenter', () => {
                        renderUniBoard(boardId, capturedFen, null);
                        infoEl.textContent = `Move ${capturedMoveNum} (${side === 'W' ? 'White' : 'Black'}): ${mv}`;
                    });
                    span.addEventListener('click', () => {
                        renderUniBoard(boardId, capturedFen, null);
                        infoEl.textContent = `Move ${capturedMoveNum} (${side === 'W' ? 'White' : 'Black'}): ${mv}`;
                        if (activeMoveEl) activeMoveEl.classList.remove('active');
                        span.classList.add('active');
                        activeMoveEl = span;
                    });

                    movesListEl.appendChild(span);
                    fenIdx++;
                });
            }

            const PIECE_UNICODE = {
                K: { sym: '♔', cls: 'wp' }, Q: { sym: '♕', cls: 'wp' }, R: { sym: '♖', cls: 'wp' },
                B: { sym: '♗', cls: 'wp' }, N: { sym: '♘', cls: 'wp' }, P: { sym: '♙', cls: 'wp' },
                k: { sym: '♚', cls: 'bp' }, q: { sym: '♛', cls: 'bp' }, r: { sym: '♜', cls: 'bp' },
                b: { sym: '♝', cls: 'bp' }, n: { sym: '♞', cls: 'bp' }, p: { sym: '♟', cls: 'bp' },
            };

            function renderUniBoard(boardId, fen, lastMove) {
                const el = document.getElementById(boardId);
                if (!el) return;

                const placement = fen.split(' ')[0];
                const ranks = placement.split('/');

                el.innerHTML = '';

                ranks.forEach((rankStr, rankIdx) => {
                    const rankNum = 8 - rankIdx;
                    const cells = [];
                    for (const ch of rankStr) {
                        if (/\d/.test(ch)) {
                            for (let k = 0; k < parseInt(ch); k++) cells.push(null);
                        } else {
                            cells.push(ch);
                        }
                    }
                    cells.forEach((piece, fileIdx) => {
                        const fileChar = String.fromCharCode(97 + fileIdx);
                        const sqName = fileChar + rankNum;
                        const isLight = (rankIdx + fileIdx) % 2 === 0;

                        let hlClass = '';
                        if (lastMove && (sqName === lastMove.from || sqName === lastMove.to)) {
                            hlClass = isLight ? ' hl-light' : ' hl-dark';
                        }

                        const sqEl = document.createElement('div');
                        sqEl.className = 'sq ' + (isLight ? 'light' : 'dark') + hlClass;

                        if (piece) {
                            const p = PIECE_UNICODE[piece];
                            if (p) {
                                const span = document.createElement('span');
                                span.className = p.cls;
                                span.textContent = p.sym;
                                sqEl.appendChild(span);
                            }
                        }
                        el.appendChild(sqEl);
                    });
                });
            }

            function initTheme() {
                const saved = localStorage.getItem('lichess-dash-theme') || 'dark';
                document.documentElement.setAttribute('data-theme', saved);
                document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀' : '☾';
            }

            document.getElementById('themeToggle').addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('lichess-dash-theme', next);
                document.getElementById('themeToggle').textContent = next === 'dark' ? '☀' : '☾';
                renderChart();
            });

            function renderAll() {
                expandedRow = null;
                renderStats();
                renderChart();
                renderFormStrip();
                renderTable();
            }

            prepareData();
            renderLastUpdated();
            renderVariantSelector();
            initTheme();
            renderAll();

        })();
    </script>
</body>

</html>
