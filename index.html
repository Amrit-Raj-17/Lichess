<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lichess Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

    <script src="data/data.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #000000;
        }

        h2 {
            margin-bottom: 10px;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .card {
            background: #a8a8a8;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .stat {
            font-size: 22px;
            font-weight: bold;
        }

        .small {
            color: #000000;
        }

        canvas {
            background: #dadada;
            border-radius: 8px;
            padding: 10px;
        }

        .recent {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .win {
            background: #22c55e;
        }

        .loss {
            background: #ef4444;
        }

        .draw {
            background: #eab308;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            padding: 6px;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #000000;
        }

        .card {
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- PLAYER OVERVIEW -->
        <div class="grid grid-4" id="overview"></div>

        <!-- RATING GRAPH -->
        <div class="card">
            <h2>Rating Progress</h2>
            <div id="ratingChart" style="height: 400px;"></div>
        </div>

        <!-- VARIANT + COLOR -->
        <div class="grid grid-2">

            <div class="card">
                <h2>Performance by Variant</h2>
                <div id="variantStats"></div>
            </div>

            <div class="card">
                <h2>Win Rate by Color</h2>
                <canvas id="colorChart"></canvas>
            </div>

        </div>

        <!-- RECENT + STREAK -->
        <div class="grid grid-2">

            <div class="card">
                <h2>Recent Form</h2>
                <div class="recent" id="recentForm"></div>
            </div>

            <div class="card">
                <h2>Streaks</h2>
                <div id="streaks"></div>
            </div>

        </div>

        <!-- HEATMAP + RESULT -->
        <div class="grid grid-2">

            <div class="card">
                <h2>Activity Heatmap</h2>
                <table id="heatmap"></table>
            </div>

            <div class="card">
                <h2>Result Distribution</h2>
                <canvas style="height: 310px; width: 310px;" id="resultChart"></canvas>
            </div>

        </div>

    </div>

    <script>

        const allGames = [];
        const recentGames = [];
        const gamesByVariant = {};

        function loadData(base) {
            const games = base.games.sort((a, b) => a.timestamp - b.timestamp);
            allGames.push(...games);
            recentGames.push(...games.slice(-25));
        }

        function prepareData() {
            allGames.forEach(g => {
                if (!gamesByVariant[g.variant]) gamesByVariant[g.variant] = [];
                gamesByVariant[g.variant].push(g);
            });
        }

        function buildOverview() {
            const total = allGames.length;
            const wins = allGames.filter(g => g.result === "win").length;
            const losses = allGames.filter(g => g.result === "loss").length;
            const draws = allGames.filter(g => g.result === "draw").length;

            const winRate = ((wins / total) * 100).toFixed(1);

            const div = document.getElementById("overview");

            div.innerHTML = `
                <div class="card"><div class="stat">${total}</div><div class="small">Games</div></div>
                <div class="card"><div class="stat">${winRate}%</div><div class="small">Win Rate</div></div>
                <div class="card"><div class="stat">${wins}</div><div class="small">Wins</div></div>
                <div class="card"><div class="stat">${losses}</div><div class="small">Losses</div></div>
            `;
        }

        function buildRatingChart() {
            const datasetsMap = {};

            allGames.forEach(g => {
                if (!datasetsMap[g.variant]) datasetsMap[g.variant] = [];
                datasetsMap[g.variant].push({
                    x: g.timestamp,
                    y: g.rating
                });
            });

            const variantColors = {
                bullet: "#22c55e",
                blitz: "#3b82f6",
                rapid: "#f59e0b",
                classical: "#ef4444",
                correspondence: "#59fda6",
                ultraBullet: "#9e9e9e",
            };

            const datasets = Object.keys(datasetsMap).map(variant => ({
                label: variant.charAt(0).toUpperCase() + variant.slice(1),
                data: datasetsMap[variant].sort((a, b) => a.x - b.x),
                borderColor: variantColors[variant] || "#888888",
                backgroundColor: "transparent",
                pointRadius: 3,
                pointHoverRadius: 6,
                borderWidth: 2,
                tension: 0,
            }));
            
            const container = document.getElementById("ratingChart");
            container.innerHTML = '<canvas id="ratingCanvas"></canvas>';

            new Chart(document.getElementById("ratingCanvas"), {
                type: "line",
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: "nearest",
                        intersect: false
                    },
                    plugins: {
                        legend: { position: "top" },
                        zoom: {
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                mode: "x"
                            },
                            pan: {
                                enabled: true,
                                mode: "x"
                            }
                        },
                        tooltip: {
                            callbacks: {
                                title: ctx => new Date(ctx[0].parsed.x).toLocaleDateString(),
                                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: "time",
                            time: {
                                unit: "month",
                                displayFormats: { month: "MMM yyyy" }
                            },
                            title: { display: true, text: "Date" }
                        },
                        y: {
                            title: { display: true, text: "Rating" }
                        }
                    }
                }
            });
        }

        function buildVariantStats() {
            const div = document.getElementById("variantStats");

            let html = "";

            for (let v in gamesByVariant) {
                const games = gamesByVariant[v];
                const wins = games.filter(g => g.result === "win").length;
                const wr = ((wins / games.length) * 100).toFixed(1);

                html += `<p>${v}: ${games.length} games | ${wr}% WR</p>`;
            }

            div.innerHTML = html;
        }

        function buildRecentForm() {
            const div = document.getElementById("recentForm");

            recentGames.forEach(g => {
                const d = document.createElement("div");
                d.classList.add("dot", g.result);
                div.appendChild(d);
            });
        }

        function buildColorChart() {
            const white = allGames.filter(g => g.color === "white");
            const black = allGames.filter(g => g.color === "black");

            const wWin = white.filter(g => g.result === "win").length;
            const bWin = black.filter(g => g.result === "win").length;

            new Chart(document.getElementById("colorChart"), {
                type: "bar",
                data: {
                    labels: ["White", "Black"],
                    datasets: [{
                        label: "Wins",
                        data: [wWin, bWin]
                    }]
                }
            });
        }

        function buildStreaks() {
            let maxWin = 0, maxLoss = 0, cur = 0;

            allGames.forEach(g => {
                if (g.result === "win") {
                    cur = cur > 0 ? cur + 1 : 1;
                    maxWin = Math.max(maxWin, cur);
                } else if (g.result === "loss") {
                    cur = cur < 0 ? cur - 1 : -1;
                    maxLoss = Math.min(maxLoss, cur);
                }
            });

            document.getElementById("streaks").innerHTML = `
        <p>Max Win Streak: ${maxWin}</p>
        <p>Max Loss Streak: ${Math.abs(maxLoss)}</p>
    `;
        }

        function buildHeatmap() {
            const map = {};

            allGames.forEach(g => {
                const d = new Date(g.timestamp);
                const day = d.getDay();
                const hour = d.getHours();

                if (!map[day]) map[day] = {};
                if (!map[day][hour]) map[day][hour] = 0;

                map[day][hour]++;
            });

            const table = document.getElementById("heatmap");

            let html = "";

            for (let d = 0; d < 7; d++) {
                html += "<tr>";
                for (let h = 0; h < 24; h++) {
                    const val = (map[d] && map[d][h]) || 0;
                    html += `<td>${val}</td>`;
                }
                html += "</tr>";
            }

            table.innerHTML = html;
        }

        function buildResultChart() {
            const wins = allGames.filter(g => g.result === "win").length;
            const losses = allGames.filter(g => g.result === "loss").length;
            const draws = allGames.filter(g => g.result === "draw").length;

            new Chart(document.getElementById("resultChart"), {
                type: "pie",
                data: {
                    labels: ["Wins", "Losses", "Draws"],
                    datasets: [{
                        data: [wins, losses, draws]
                    }]
                }
            });
        }

        (function init() {
            loadData(data);
            prepareData();

            buildOverview();
            buildRatingChart();
            buildVariantStats();
            buildRecentForm();
            buildColorChart();
            buildStreaks();
            buildHeatmap();
            buildResultChart();
        })();

    </script>

</body>

</html>
